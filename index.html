function renderCostsView() {
  const years = getAllYears();
  const year = state.costsYear || years[0] || String(new Date().getFullYear());
  const yearNum = parseInt(year, 10);

  let html = `<h2 class="section-title">${ICONS.bar(18, "#2D6A4F")} Kosten-Übersicht</h2>

  <select class="sel" data-action="costs-select-year" style="width:100%; margin-bottom:1rem; background:white; color:var(--ink); border:1px solid #d6d3d1;">
    ${years.map(y => `<option value="${esc(y)}" ${year === y ? "selected" : ""}>${esc(y)}</option>`).join("")}
  </select>`;

  // --- 1. Saison ---
  const christian = state.players.find(p => p.name === "Christian");
  let roundsForYear = [];
  if (christian && yearNum >= 2016) {
    roundsForYear = christian.rounds.filter(r => (r.year || (r.date||"").slice(0,4)) === year);
    html += renderSeasonCard(roundsForYear, year);
  } else if (!christian) {
    html += `<div class="card-dashed">Kein Spieler "Christian" gefunden – die Kosten-Berechnung gilt nur für diesen Spieler.</div>`;
  } else {
    html += `<div class="card-dashed">Die Kosten-Berechnung gilt erst ab Saison 2016.</div>`;
  }

  // --- 2. Kostenaufstellung (gesamt) ---
  const seasonData = christian ? computeSeasonData(roundsForYear, year) : null;
  const yearAccessories = state.accessories.filter(a => a.year === year);
  const accessoriesTotal = yearAccessories.reduce((sum,a) => sum + (parseDecimal(a.amount)||0), 0);

  html += `<div class="collapsible-card">
    <button class="collapsible-head" data-action="toggle-cost-summary">
      <h3>Kostenaufstellung ${yearNum}</h3>
      <span class="collapsible-arrow ${!state.showCostSummary ? 'collapsed' : ''}">${ICONS.chevron(16)}</span>
    </button>`;

  if (state.showCostSummary) {
    html += `<div class="collapsible-body">`;
    if (seasonData) {
      if (seasonData.prices.hasSeasonPass) {
        html += `<div style="display:flex; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid #f5f5f4;">
          <span>Jahreskarte</span><span class="font-mono" style="font-weight:600;">${seasonData.prices.seasonPass.toFixed(2).replace('.',',')} €</span>
        </div>`;
        if (seasonData.weekendHolidayCost > 0) {
          html += `<div style="display:flex; align-items:center; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid #f5f5f4;">
            <div>
              <div>Wochenende/Feiertage (zusätzlich)</div>
              <div style="font-size:0.75rem; color:#a8a29e;">${seasonData.weekendHolidayFirstCount} Erst-Runde${seasonData.weekendHolidayFirstCount!==1?'n':''}, ${seasonData.weekendHolidayExtraCount} Wiederholungsrunde${seasonData.weekendHolidayExtraCount!==1?'n':''}</div>
            </div>
            <span class="font-mono" style="font-weight:600;">${seasonData.weekendHolidayCost.toFixed(2).replace('.',',')} €</span>
          </div>`;
        }
      } else {
        html += `<div style="display:flex; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid #f5f5f4;">
          <span>Rundenkosten (Tagestarif, aktuell)</span><span class="font-mono" style="font-weight:600;">${seasonData.wouldCost.toFixed(2).replace('.',',')} €</span>
        </div>`;
      }
    }
    if (yearAccessories.length > 0) {
      yearAccessories.sort((a,b)=>a.date<b.date?1:-1).forEach(a => {
        html += `<div style="display:flex; align-items:center; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid #f5f5f4;">
          <div>
            <div style="font-weight:500;">${esc(a.name)}</div>
            <div style="font-size:0.75rem; color:#a8a29e;">${formatDate(a.date)}</div>
          </div>
          <div style="display:flex; align-items:center; gap:0.5rem;">
            <div class="font-mono" style="font-weight:600;">${parseDecimal(a.amount).toFixed(2).replace('.',',')} €</div>
            <button class="icon-btn icon-btn-danger" style="width:1.75rem;height:1.75rem;" data-action="delete-accessory" data-id="${esc(a.id)}">${ICONS.trash(15)}</button>
          </div>
        </div>`;
      });
    } else {
      html += `<p style="font-size:0.85rem; color:#a8a29e; margin:0.5rem 0;">Noch keine Zubehör-Käufe für ${yearNum}.</p>`;
    }

    const grandTotal = (seasonData
      ? (seasonData.prices.hasSeasonPass
          ? seasonData.prices.seasonPass + (seasonData.prices.seasonPassAll ? 0 : seasonData.weekendHolidayCost)
          : seasonData.wouldCost)
      : 0) + accessoriesTotal;
    html += `<div style="display:flex; justify-content:space-between; padding-top:0.6rem; margin-top:0.4rem; border-top:2px solid #e7e5e4;">
      <span style="font-weight:700;">Gesamt</span><span class="font-mono" style="font-weight:700; font-size:1.1rem;">${grandTotal.toFixed(2).replace('.',',')} €</span>
    </div>`;
    html += `</div>`;
  }
  html += `</div>`;

  // --- 3. Zubehör-Kauf erfassen (input only) ---
  html += `<div class="collapsible-card">
    <button class="collapsible-head" data-action="toggle-accessory-form">
      <h3>Zubehör-Kauf erfassen</h3>
      <span class="collapsible-arrow ${state.collapsed.accessoryForm ? 'collapsed' : ''}">${ICONS.chevron(16)}</span>
    </button>`;
  if (!state.collapsed.accessoryForm) {
    html += `<div class="collapsible-body">
      <label class="field-label">Bezeichnung</label>
      <input type="text" id="accessory-name" placeholder="z.B. neuer Schläger" style="margin-bottom:0.5rem;" />
      <div style="display:flex; gap:0.5rem; margin-bottom:0.5rem;">
        <input type="date" id="accessory-date" value="${yearNum===new Date().getFullYear() ? todayISO() : year+'-01-01'}" style="flex:1;" />
        <input type="text" inputMode="decimal" id="accessory-amount" placeholder="€" style="width:5rem;" />
      </div>
      <button class="btn btn-primary btn-full" data-action="add-accessory" data-year="${esc(year)}">${ICONS.plus(15)} Hinzufügen</button>
    </div>`;
  }
  html += `</div>`;

  // --- 4. Wochenenden & Feiertage ---
  const holidays = germanHolidays(yearNum);
  const seasonStart = new Date(yearNum, 2, 1);
  const seasonEnd = new Date(yearNum, 9, 31);
  let weekendDays = 0;
  const cur = new Date(seasonStart);
  while (cur <= seasonEnd) {
    const dow = cur.getDay();
    if (dow === 0 || dow === 6) weekendDays++;
    cur.setDate(cur.getDate()+1);
  }

  html += `<div class="collapsible-card">
    <button class="collapsible-head" data-action="toggle-holidays-card">
      <h3>Wochenenden &amp; Feiertage ${yearNum}</h3>
      <span class="collapsible-arrow ${state.collapsed.holidays ? 'collapsed' : ''}">${ICONS.chevron(16)}</span>
    </button>`;
  if (!state.collapsed.holidays) {
    html += `<div class="collapsible-body">
      <p style="font-size:0.8rem; color:#78716c; margin:0 0 0.75rem;">Zeitraum 01.03.–31.10.</p>
      <div class="stat-grid" style="grid-template-columns:repeat(2,1fr); margin-bottom:0.75rem;">
        <div class="stat-card"><div class="stat-label">Wochenend-Tage</div><div class="stat-value font-mono">${weekendDays}</div></div>
        <div class="stat-card"><div class="stat-label">Feiertage (NRW)</div><div class="stat-value font-mono">${holidays.length}</div></div>
      </div>
      <div class="note-list" style="border-top:1px solid #f5f5f4; padding-top:0.5rem;">
        ${holidays.sort((a,b)=>a.date-b.date).map(h => `<div class="note-item">${formatDate(h.date.toISOString().slice(0,10))} – ${esc(h.name)}</div>`).join("")}
      </div>
    </div>`;
  }
  html += `</div>`;

  return html;
}

function renderStatsView(player, rounds) {
  const n = rounds.length;
  if (n === 0) {
    return `<h2 class="section-title">${ICONS.bar(18, "#2D6A4F")} Statistik von ${esc(player.name)}</h2>
    <div class="card-dashed">Noch keine Daten für Statistiken. Trage zuerst ein paar Runden ein.</div>`;
  }

  const totals = rounds.map(r => r.scores.reduce((a,b)=>a+b,0));
  const best = Math.min(...totals);
  const avg = totals.reduce((a,b)=>a+b,0) / n;
  const totalAces = rounds.reduce((s,r) => s + r.scores.filter(v=>v===1).length, 0);
  const totalStrokes = totals.reduce((a,b)=>a+b,0);
  const cleanRounds = rounds.filter(r => r.scores.every((s,i) => s <= PARS[i])).length;

  const holeStats = HOLES.map((hole, idx) => {
    const vals = rounds.map(r => r.scores[idx]);
    const holeAvg = vals.reduce((a,b)=>a+b,0) / vals.length;
    const holeAces = vals.filter(v=>v===1).length;
    return { hole, par: PARS[idx], avg: holeAvg, aces: holeAces };
  });
  // Rank holes by average score (1 = best/lowest average, 18 = worst/highest average)
  [...holeStats].sort((a,b) => a.avg - b.avg).forEach((h, i) => { h.rank = i + 1; });

  const allScores = rounds.flatMap(r => r.scores);
  const dist = [1,2,3,4,5].map(val => ({
    val, label: val === 5 ? "5+" : String(val),
    count: allScores.filter(s => val === 5 ? s >= 5 : s === val).length,
  }));
  const maxDist = Math.max(...dist.map(d=>d.count), 1);

  const sorted = [...rounds].sort((a,b) => a.date > b.date ? 1 : -1);

  let html = `<h2 class="section-title">${ICONS.bar(18, "#2D6A4F")} Statistik von ${esc(player.name)}</h2>`;

  html += `<div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Runden</div><div class="stat-value font-mono">${n}</div></div>
    <div class="stat-card"><div class="stat-label">Bestes Ergebnis</div><div class="stat-value font-mono">${best}</div><div class="stat-sub">${best-PAR_TOTAL>=0?'+':''}${best-PAR_TOTAL} zu Par</div></div>
    <div class="stat-card"><div class="stat-label">Schnitt</div><div class="stat-value font-mono">${avg.toFixed(1)}</div><div class="stat-sub">Par ${PAR_TOTAL}</div></div>
    <div class="stat-card accent"><div class="stat-label">Asse insgesamt</div><div class="stat-value font-mono">${totalAces}</div></div>
    <div class="stat-card"><div class="stat-label">Fehlerfreie Runden</div><div class="stat-value font-mono">${cleanRounds}</div><div class="stat-sub">${n>0 ? (cleanRounds/n*100).toFixed(1).replace('.',',') : '0'} % aller Runden</div></div>
  </div>`;

  html += `<div class="card" style="font-size:0.875rem; color:#57534e;">Insgesamt <strong style="color:#292524;">${totalStrokes}</strong> Schläge in <strong style="color:#292524;">${n}</strong> Runden gespielt.</div>`;

  if (SEASON_PLAYER_NAMES.includes(player.name) && state.activeYear !== "all" && parseInt(state.activeYear,10) >= 2022) {
    html += renderSeasonCard(rounds, state.activeYear);
  }

  html += `<div class="card">
    <h3 style="font-size:0.875rem; font-weight:600; color:#44403c; margin:0 0 0.75rem;">Verteilung der Schläge pro Bahn</h3>
    <div class="bar-chart">`;
  dist.forEach(d => {
    const h = Math.max((d.count / maxDist) * 100, 3);
    html += `<div class="bar-col">
      <div class="count font-mono">${d.count}</div>
      <div class="bar ${d.val===1?'ace':''}" style="height:${h}%;"></div>
      <div class="lbl">${d.label}</div>
    </div>`;
  });
  html += `</div></div>`;

  if (sorted.length > 1) {
    const totalsArr = sorted.map(r => r.scores.reduce((a,b)=>a+b,0));
    const max = Math.max(...totalsArr), min = Math.min(...totalsArr);
    const range = (max - min) || 1;
    html += `<div class="card">
      <h3 style="font-size:0.875rem; font-weight:600; color:#44403c; margin:0 0 0.75rem;">Verlauf (Gesamtschläge je Runde)</h3>
      <div class="trend-chart">`;
    sorted.forEach((r, i) => {
      const total = totalsArr[i];
      const hpct = 15 + ((total - min) / range) * 85;
      html += `<div class="col">
        <div class="val font-mono">${total}</div>
        <div class="bar ${total <= PAR_TOTAL ? 'under' : ''}" style="height:${hpct}%;"></div>
        <div class="lbl">${formatDate(r.date).slice(0,5)}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="card" style="padding:0;">
    <h3 style="font-size:0.875rem; font-weight:600; color:#44403c; padding:1rem 1rem 0.5rem; margin:0;">Bahn-Statistik</h3>
    <table class="hole-table">
      <thead><tr><th class="l">Bahn</th><th class="c">Par</th><th class="c">Schnitt</th><th class="c">Rang</th><th class="r">Asse</th></tr></thead>
      <tbody>`;
  holeStats.forEach(h => {
    const rankColor = h.rank === 1 ? '#059669' : h.rank === 18 ? '#e11d48' : '#57534e';
    html += `<tr>
      <td class="l">${h.hole}</td>
      <td style="color:#a8a29e;">${h.par}</td>
      <td class="font-mono" style="font-weight:600; color:${h.avg <= h.par ? '#059669' : '#e11d48'};">${h.avg.toFixed(1)}</td>
      <td class="font-mono" style="font-weight:600; color:${rankColor};">${h.rank}</td>
      <td class="r txt-ace" style="font-weight:600;">${h.aces || '–'}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  html += renderQueryCard(player, getYears(player));

  return html;
}

// ============================================================
// Actions / event handling
// ============================================================
function attachHandlers() {
  const root = document.getElementById("root");

  root.querySelectorAll("[data-action]").forEach(el => {
    const action = el.dataset.action;
    const handler = (ev) => {
      ev.preventDefault();
      handleAction(action, el, ev);
    };
    if (el.tagName === "SELECT") {
      el.addEventListener("change", handler);
    } else if (el.tagName === "INPUT" && el.type === "file") {
      el.addEventListener("change", handler);
    } else {
      el.addEventListener("click", handler);
    }
  });

  // Enter key for new player inputs
  const newPlayerInput = document.getElementById("new-player-name");
  if (newPlayerInput) {
    newPlayerInput.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") handleAction("add-player");
    });
    newPlayerInput.focus();
  }
  const newEntryInput = document.getElementById("new-entry-player-name");
  if (newEntryInput) {
    newEntryInput.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") handleAction("add-entry-player", newEntryInput);
    });
  }
  const entryDate = document.getElementById("entry-date");
  if (entryDate) {
    entryDate.addEventListener("change", (ev) => {
      state.entry.date = ev.target.value;
    });
  }
  const entryTime = document.getElementById("entry-time");
  if (entryTime) {
    entryTime.addEventListener("change", (ev) => {
      state.entry.time = ev.target.value;
    });
  }
  const filterFrom = document.getElementById("rounds-filter-from");
  if (filterFrom) {
    filterFrom.addEventListener("change", (ev) => {
      state.roundsFilter.dateFrom = ev.target.value;
      render();
    });
  }
  const filterTo = document.getElementById("rounds-filter-to");
  if (filterTo) {
    filterTo.addEventListener("change", (ev) => {
      state.roundsFilter.dateTo = ev.target.value;
      render();
    });
  }
}

function handleAction(action, el, ev) {
  const e = state.entry;

  switch (action) {
    case "set-view":
      state.view = el.dataset.view;
      render();
      break;

    case "set-view-select":
      state.view = el.value;
      render();
      break;

    case "switch-player":
      state.activePlayerId = el.value;
      state.activeYear = "all";
      state.query.result = null; state.queryExportText = null;
      render();
      break;

    case "switch-year":
      state.activeYear = el.value;
      render();
      break;

    case "goto-settings-players":
      state.view = "settings";
      state.collapsed.players = false;
      state.editingPlayerId = null;
      render();
      break;

    case "rounds-filter-toggle-player": {
      const id = el.dataset.id;
      const pos = state.roundsFilter.playerIds.indexOf(id);
      if (pos >= 0) state.roundsFilter.playerIds.splice(pos, 1);
      else state.roundsFilter.playerIds.push(id);
      render();
      break;
    }

    case "rounds-filter-clear":
      state.roundsFilter = { playerIds: [], dateFrom: "", dateTo: "" };
      render();
      break;

    case "result-continue":
      state.lastSavedResult = null;
      state.view = "rounds";
      render();
      break;

    case "edit-player-name":
      state.editingPlayerId = el.dataset.id;
      render();
      break;

    case "save-player-name": {
      const id = el.dataset.id;
      const input = document.getElementById("edit-player-name-" + id);
      const name = input?.value.trim();
      if (name) {
        const player = state.players.find(p => p.id === id);
        if (player) player.name = name;
        persist();
      }
      state.editingPlayerId = null;
      render();
      break;
    }

    case "move-player-up": {
      const id = el.dataset.id;
      const idx = state.players.findIndex(p => p.id === id);
      if (idx > 0) {
        const [p] = state.players.splice(idx, 1);
        state.players.splice(idx - 1, 0, p);
        persist();
        render();
      }
      break;
    }

    case "move-player-down": {
      const id = el.dataset.id;
      const idx = state.players.findIndex(p => p.id === id);
      if (idx >= 0 && idx < state.players.length - 1) {
        const [p] = state.players.splice(idx, 1);
        state.players.splice(idx + 1, 0, p);
        persist();
        render();
      }
      break;
    }

    case "close-modal":
      state.showAddPlayer = false;
      render();
      break;

    case "add-player": {
      const input = document.getElementById("new-player-name");
      const name = input.value.trim();
      if (!name) return;
      const np = { id: uid(), name, rounds: [] };
      state.players.push(np);
      state.activePlayerId = np.id;
      persist();
      render();
      break;
    }

    case "remove-player": {
      const id = el.dataset.id;
      const player = state.players.find(p => p.id === id);
      if (!player) return;
      openConfirm(`${player.name} und alle ${player.rounds.length} Runden wirklich entfernen?`, "do-remove-player", { id });
      break;
    }

    case "delete-round": {
      const id = el.dataset.id;
      const playerId = el.dataset.player;
      const player = state.players.find(p => p.id === playerId) || getActivePlayer();
      const round = player?.rounds.find(r => r.id === id);
      const groupId = round?.groupId || null;
      const msg = groupId ? "Diese Runde (alle Mitspieler) wirklich löschen?" : "Diese Runde wirklich löschen?";
      openConfirm(msg, "do-delete-round", { id, playerId: player?.id, groupId });
      break;
    }

    case "do-remove-player": {
      const { id } = state.confirmModal.payload;
      state.players = state.players.filter(p => p.id !== id);
      if (state.activePlayerId === id && state.players.length) {
        state.activePlayerId = state.players[0].id;
      }
      persist();
      closeConfirm();
      render();
      break;
    }

    case "do-delete-round": {
      const { id, playerId, groupId } = state.confirmModal.payload;
      if (groupId) {
        state.players.forEach(p => {
          p.rounds = p.rounds.filter(r => r.groupId !== groupId);
        });
      } else {
        const player = state.players.find(p => p.id === playerId) || getActivePlayer();
        if (player) player.rounds = player.rounds.filter(r => r.id !== id);
      }
      persist();
      closeConfirm();
      render();
      break;
    }

    case "do-delete-accessory": {
      const { id } = state.confirmModal.payload;
      state.accessories = state.accessories.filter(a => a.id !== id);
      persistAccessories();
      closeConfirm();
      render();
      break;
    }

    case "confirm-cancel":
      closeConfirm();
      render();
      break;

    case "export-data": {
      const json = JSON.stringify(buildExportBundle(), null, 2);
      state.exportData = json;
      state.showExportModal = true;
      render();
      // try to auto-copy immediately
      attemptCopy(json);
      break;
    }

    case "close-export-modal":
      state.showExportModal = false;
      state.exportData = null;
      render();
      break;

    case "copy-export-data": {
      const ta = document.getElementById("export-textarea");
      if (ta) {
        ta.focus();
        ta.select();
      }
      attemptCopy(state.exportData);
      break;
    }

    case "show-round-detail":
      state.detailRound = { playerId: el.dataset.player, roundId: el.dataset.round };
      state.shareText = null;
      render();
      break;

    case "close-round-detail":
      state.detailRound = null;
      state.shareText = null;
      render();
      break;

    case "share-round-detail": {
      const { playerId, roundId } = state.detailRound;
      const text = buildRoundShareText(playerId, roundId);
      state.shareText = text;
      attemptCopy(text);
      render();
      break;
    }

    case "toggle-data-menu":
      state.showDataMenu = !state.showDataMenu;
      render();
      break;

    case "toggle-season-card":
      state.collapsed.season = !state.collapsed.season;
      render();
      break;

    case "toggle-holidays-card":
      state.collapsed.holidays = !state.collapsed.holidays;
      render();
      break;

    case "toggle-manage-players":
      state.collapsed.players = !state.collapsed.players;
      render();
      break;

    case "toggle-pricing-section":
      state.collapsed.pricing = !state.collapsed.pricing;
      render();
      break;

    case "toggle-weather-section":
      state.collapsed.weatherLoc = !state.collapsed.weatherLoc;
      render();
      break;

    case "search-weather-location": {
      const input = document.getElementById("weather-location-search");
      const query = input?.value.trim();
      if (!query) return;
      state.weatherLocationSearch = query;
      state.weatherLocationResults = [];
      render();
      searchWeatherLocation(query)
        .then(results => {
          state.weatherLocationResults = results;
          if (results.length === 0) showToast("Kein Ort gefunden.");
          render();
        })
        .catch(() => {
          showToast("Ortssuche fehlgeschlagen. Internetverbindung prüfen.");
          render();
        });
      break;
    }

    case "select-weather-location": {
      const idx = parseInt(el.dataset.idx, 10);
      const loc = state.weatherLocationResults[idx];
      if (!loc) return;
      state.weatherLocation = loc;
      state.weatherLocationResults = [];
      state.weatherLocationSearch = "";
      persistWeatherLocation();
      showToast(`Standort gesetzt: ${loc.name} ✓`);
      render();
      break;
    }

    case "clear-weather-location":
      state.weatherLocation = null;
      persistWeatherLocation();
      render();
      break;

    case "toggle-data-section":
      state.collapsed.data = !state.collapsed.data;
      render();
      break;

    case "toggle-accessory-form":
      state.collapsed.accessoryForm = !state.collapsed.accessoryForm;
      render();
      break;

    case "toggle-cost-summary":
      state.showCostSummary = !state.showCostSummary;
      render();
      break;

    case "pricing-select-year":
      state.pricingEditYear = el.value;
      render();
      break;

    case "pricing-toggle-pass": {
      const editYear = state.pricingEditYear || getAllYears()[0];
      const current = getPricesForYear(editYear);
      const val = el.dataset.val; // "none" | "weekdays" | "all"
      state.pricing[editYear] = { ...current, seasonPassType: val, hasSeasonPass: val !== "none" };
      persistPricing();
      render();
      break;
    }

    case "save-pricing": {
      const year = el.dataset.year;
      const first = parseDecimal(document.getElementById("price-first")?.value);
      const extra = parseDecimal(document.getElementById("price-extra")?.value);
      const passInput = document.getElementById("price-pass");
      const pass = passInput ? parseDecimal(passInput.value) : getPricesForYear(year).seasonPass;
      const hasSeasonPass = getPricesForYear(year).hasSeasonPass;
      const seasonPassType = getPricesForYear(year).seasonPassType;
      state.pricing[year] = {
        firstRoundPerDay: isNaN(first) ? DEFAULT_SEASON_PRICES.firstRoundPerDay : first,
        extraRoundPerDay: isNaN(extra) ? DEFAULT_SEASON_PRICES.extraRoundPerDay : extra,
        seasonPass: isNaN(pass) ? DEFAULT_SEASON_PRICES.seasonPass : pass,
        hasSeasonPass,
        seasonPassType,
      };
      persistPricing();
      showToast(`Preise für ${year} gespeichert ✓`);
      break;
    }

    case "costs-select-year":
      state.costsYear = el.value;
      render();
      break;

    case "add-accessory": {
      const year = el.dataset.year;
      const name = document.getElementById("accessory-name")?.value.trim();
      const date = document.getElementById("accessory-date")?.value || todayISO();
      const amount = parseDecimal(document.getElementById("accessory-amount")?.value);
      if (!name) { showToast("Bitte einen Namen für den Kauf eingeben."); return; }
      if (isNaN(amount)) { showToast("Bitte einen gültigen Betrag eingeben."); return; }
      state.accessories.push({ id: uid(), date, year: date.slice(0,4) || year, name, amount });
      persistAccessories();
      render();
      break;
    }

    case "delete-accessory": {
      const id = el.dataset.id;
      openConfirm("Diesen Eintrag wirklich löschen?", "do-delete-accessory", { id });
      break;
    }

    case "open-github-settings":
      state.showGithubSettings = true;
      render();
      break;

    case "close-github-settings":
      state.showGithubSettings = false;
      render();
      break;

    case "save-github-settings": {
      const owner = (document.getElementById("gh-owner")?.value || "").trim();
      const repo = (document.getElementById("gh-repo")?.value || "").trim();
      const branch = (document.getElementById("gh-branch")?.value || "main").trim() || "main";
      const path = (document.getElementById("gh-path")?.value || "minigolf-daten.json").trim() || "minigolf-daten.json";
      const token = (document.getElementById("gh-token")?.value || "").trim();
      saveGithubConfig({ owner, repo, branch, path, token });
      state.showGithubSettings = false;
      showToast("GitHub-Einstellungen gespeichert ✓");
      render();
      break;
    }

    case "github-save":
      githubSave();
      break;

    case "github-load":
      githubLoad();
      break;


    case "import-data": {
      const file = el.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev2) => {
        try {
          let text = String(ev2.target.result || "").trim();
          // If pasted via Notes, there may be stray characters before/after the JSON.
          // Detect whether it's a JSON array (old format) or object (new bundle format).
          const firstBracket = text.indexOf("[");
          const firstBrace = text.indexOf("{");
          let openChar = "[", closeChar = "]";
          if (firstBrace !== -1 && (firstBracket === -1 || firstBrace < firstBracket)) {
            openChar = "{"; closeChar = "}";
          }
          const start = text.indexOf(openChar);
          const end = text.lastIndexOf(closeChar);
          if (start !== -1 && end !== -1 && end > start) {
            text = text.slice(start, end + 1);
          }
          const data = JSON.parse(text);
          if (applyImportedBundle(data)) {
            state.entry.phase = "setup";
            state.entry.scoresByPlayer = {};
            clearEntryProgress();
            showToast("Daten importiert ✓");
            render();
          } else {
            showToast("Datei enthält keine gültigen Spielerdaten.");
          }
        } catch {
          showToast("Datei konnte nicht gelesen werden.");
        }
      };
      reader.readAsText(file);
      break;
    }

    case "reset-data": {
      openConfirm("Alle lokal gespeicherten Daten löschen und die eingebauten Ausgangsdaten neu laden? Eigene Eintragungen seit dem letzten Export/Sync gehen dabei verloren.", "do-reset-data", {});
      break;
    }

    case "do-reset-data": {
      try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
      try { localStorage.removeItem(PRICING_KEY); } catch(e) {}
      try { localStorage.removeItem(ACCESSORIES_KEY); } catch(e) {}
      clearEntryProgress();
      state.players = getSeedData();
      state.activePlayerId = state.players.length ? state.players[0].id : null;
      state.activeYear = "all";
      state.pricing = {};
      state.accessories = [];
      state.view = "rounds";
      persist();
      closeConfirm();
      render();
      break;
    }

    // ---------- Entry flow ----------
    case "toggle-entry-player": {
      const id = el.dataset.id;
      const isSelected = e.selectedIds.includes(id);
      if (isSelected) {
        e.selectedIds = e.selectedIds.filter(x => x !== id);
        e.saveIds = e.saveIds.filter(x => x !== id);
      } else {
        e.selectedIds.push(id);
        if (!e.saveIds.includes(id)) e.saveIds.push(id);
      }
      render();
      break;
    }

    case "toggle-weather": {
      const key = el.dataset.key;
      const tempInput = document.getElementById("entry-temperature");
      if (tempInput) e.temperature = tempInput.value;
      const windInput = document.getElementById("entry-windspeed");
      if (windInput) e.windSpeed = windInput.value;
      const pos = e.weatherKeys.indexOf(key);
      if (pos >= 0) e.weatherKeys.splice(pos, 1);
      else e.weatherKeys.push(key);
      render();
      break;
    }

    case "fetch-weather-auto": {
      if (!state.weatherLocation) return;
      const dateInput = document.getElementById("entry-date");
      if (dateInput) e.date = dateInput.value || e.date;
      state.weatherLookupStatus = "loading";
      render();
      fetchWeatherForDate(e.date, state.weatherLocation.lat, state.weatherLocation.lon)
        .then(w => {
          e.weatherKeys = [w.weatherKey];
          e.temperature = String(w.temperature);
          e.windSpeed = String(w.windSpeed);
          state.weatherLookupStatus = "ok";
          showToast("Wetter übernommen ✓");
          render();
        })
        .catch(() => {
          state.weatherLookupStatus = "error";
          showToast("Wetterabruf nicht möglich – bitte manuell eingeben (z.B. ohne Internetverbindung).");
          render();
        });
      break;
    }

    case "toggle-save": {
      const id = el.dataset.id;
      if (e.saveIds.includes(id)) e.saveIds = e.saveIds.filter(x => x !== id);
      else e.saveIds.push(id);
      render();
      break;
    }

    case "add-entry-player": {
      const input = document.getElementById("new-entry-player-name");
      const name = input.value.trim();
      if (!name) return;
      const np = { id: uid(), name, rounds: [] };
      state.players.push(np);
      e.selectedIds.push(np.id);
      e.saveIds.push(np.id);
      persist();
      render();
      break;
    }

    case "start-round": {
      if (e.selectedIds.length === 0) {
        showToast("Bitte wähle mindestens einen Spieler aus.");
        return;
      }
      const dateInput = document.getElementById("entry-date");
      if (dateInput) e.date = dateInput.value || e.date;
      const timeInput = document.getElementById("entry-time");
      if (timeInput) e.time = timeInput.value || e.time;
      const tempInput = document.getElementById("entry-temperature");
      if (tempInput) e.temperature = tempInput.value;
      const windInput = document.getElementById("entry-windspeed");
      if (windInput) e.windSpeed = windInput.value;
      const init = {};
      const noteInit = {};
      const starInit = {};
      e.selectedIds.forEach(id => { init[id] = Array(18).fill(""); noteInit[id] = {}; starInit[id] = {}; });
      e.scoresByPlayer = init;
      e.notesByPlayer = noteInit;
      e.starsByPlayer = starInit;
      e.currentHole = 0;
      e.phase = "play";
      render();
      break;
    }

    case "set-score": {
      const playerId = el.dataset.player;
      const val = el.dataset.val;
      captureNotesFromDOM();
      e.scoresByPlayer[playerId][e.currentHole] = val;
      // Clear the star marking if the new score isn't in the eligible 2-6 range
      const n = parseInt(val);
      if (n < 2 || n > 6) {
        if (e.starsByPlayer[playerId]) delete e.starsByPlayer[playerId][e.currentHole];
      }
      render();
      break;
    }

    case "toggle-star": {
      const playerId = el.dataset.player;
      if (!e.starsByPlayer[playerId]) e.starsByPlayer[playerId] = {};
      if (e.starsByPlayer[playerId][e.currentHole]) {
        delete e.starsByPlayer[playerId][e.currentHole];
      } else {
        e.starsByPlayer[playerId][e.currentHole] = true;
      }
      render();
      break;
    }

    case "prev-hole":
      captureNotesFromDOM();
      e.currentHole = Math.max(e.currentHole - 1, 0);
      render();
      break;

    case "next-hole-nav":
      captureNotesFromDOM();
      e.currentHole = Math.min(e.currentHole + 1, 17);
      render();
      break;

    case "jump-hole":
      captureNotesFromDOM();
      e.currentHole = parseInt(el.dataset.idx);
      render();
      break;

    case "next-hole": {
      const allFilled = e.selectedIds.every(id => e.scoresByPlayer[id]?.[e.currentHole] !== "");
      if (!allFilled) return;
      captureNotesFromDOM();
      if (e.currentHole === 17) {
        e.phase = "finish";
      } else {
        e.currentHole = Math.min(e.currentHole + 1, 17);
      }
      render();
      break;
    }

    case "back-to-setup":
      captureNotesFromDOM();
      e.phase = "setup";
      render();
      break;

    case "discard-round":
      e.phase = "setup";
      e.scoresByPlayer = {};
      e.notesByPlayer = {};
      e.starsByPlayer = {};
      e.weatherKeys = [];
      e.temperature = "";
      e.windSpeed = "";
      e.date = todayISO();
      e.time = nowTimeHHMM();
      e.currentHole = 0;
      clearEntryProgress();
      render();
      break;

    case "save-round": {
      if (e.saveIds.length === 0) return;
      captureNotesFromDOM();
      const groupId = uid();
      const roundBase = { date: e.date, year: e.date.slice(0,4), groupId };
      if (e.time) roundBase.time = e.time;
      if (e.weatherKeys && e.weatherKeys.length > 0) roundBase.weather = [...e.weatherKeys];
      if (e.temperature) roundBase.temperature = e.temperature;
      if (e.windSpeed) roundBase.windSpeed = e.windSpeed;

      // Compute results (per saved player) before resetting entry state, to show
      // a winner screen afterwards if more than one player took part.
      const results = e.saveIds.map(id => {
        const player = state.players.find(p => p.id === id);
        const scores = e.scoresByPlayer[id].map(s => parseInt(s)||0);
        const total = scores.reduce((a,b)=>a+b,0);
        return { name: player ? player.name : "?", total, diff: total - PAR_TOTAL };
      });

      e.saveIds.forEach(id => {
        const player = state.players.find(p => p.id === id);
        if (!player) return;
        const scores = e.scoresByPlayer[id].map(s => parseInt(s)||0);
        const notes = e.notesByPlayer[id] || {};
        const stars = e.starsByPlayer[id] || {};
        const round = { ...roundBase, id: uid(), scores };
        if (Object.keys(notes).length > 0) round.notes = notes;
        if (Object.keys(stars).length > 0) round.stars = stars;
        player.rounds.unshift(round);
      });
      // reset entry state
      state.entry = {
        phase: "setup",
        selectedIds: [],
        saveIds: [],
        date: todayISO(),
        time: nowTimeHHMM(),
        currentHole: 0,
        scoresByPlayer: {},
        notesByPlayer: {},
        starsByPlayer: {},
        weatherKeys: [],
        temperature: "",
        windSpeed: "",
      };
      clearEntryProgress();
      persist();

      if (results.length > 1) {
        const winner = results.reduce((best, cur) => cur.total < best.total ? cur : best);
        state.lastSavedResult = { winnerName: winner.name, total: winner.total, diff: winner.diff };
        state.view = "result";
      } else {
        state.view = "rounds";
      }
      render();
      break;
    }

    // ---------- Abfrage ----------
    case "query-period-year": {
      const cur = parsePeriod(state.query.period);
      state.query.period = buildPeriod(el.value, cur.month);
      state.query.result = null; state.queryExportText = null;
      render();
      break;
    }

    case "query-period-month": {
      const cur = parsePeriod(state.query.period);
      state.query.period = buildPeriod(cur.year, el.value);
      state.query.result = null; state.queryExportText = null;
      render();
      break;
    }

    case "query-periodB-year": {
      const cur = parsePeriod(state.query.periodB);
      state.query.periodB = buildPeriod(el.value, cur.month);
      state.query.result = null; state.queryExportText = null;
      render();
      break;
    }

    case "query-periodB-month": {
      const cur = parsePeriod(state.query.periodB);
      state.query.periodB = buildPeriod(cur.year, el.value);
      state.query.result = null; state.queryExportText = null;
      render();
      break;
    }

    case "query-toggle-compare":
      state.query.compareEnabled = !state.query.compareEnabled;
      state.query.result = null; state.queryExportText = null;
      render();
      break;

    case "query-mode": {
      const mode = el.dataset.mode;
      state.query.mode = mode;
      if (mode === "aces") {
        state.query.operator = ">=";
        state.query.value = 1;
      } else if (mode === "errors") {
        state.query.operator = "=";
        state.query.value = 0;
      } else if (mode === "total" && state.query.value === 0) {
        state.query.value = PAR_TOTAL;
      }
      state.query.result = null; state.queryExportText = null;
      render();
      break;
    }

    case "query-allholes":
      state.query.allHoles = !state.query.allHoles;
      if (state.query.allHoles) state.query.holes = [];
      state.query.result = null; state.queryExportText = null;
      render();
      break;

    case "query-toggle-hole": {
      const idx = parseInt(el.dataset.idx);
      const pos = state.query.holes.indexOf(idx);
      if (pos >= 0) state.query.holes.splice(pos, 1);
      else state.query.holes.push(idx);
      state.query.result = null; state.queryExportText = null;
      render();
      break;
    }

    case "query-operator":
      state.query.operator = el.dataset.op;
      state.query.result = null; state.queryExportText = null;
      render();
      break;

    case "run-query": {
      const valInput = document.getElementById("query-value");
      if (valInput) {
        const v = parseFloat(valInput.value);
        state.query.value = isNaN(v) ? 0 : v;
      }
      state.queryExportText = null;
      evaluateQuery(getActivePlayer());
      render();
      break;
    }

    case "export-query-result": {
      const q = state.query;
      const r = q.result;
      if (!r) return;
      const player = getActivePlayer();
      const modeLabel = { total: "Gesamtschläge", hole: "Einzelne Bahn(en)", aces: "Asse pro Runde", errors: "Fehler pro Runde" }[q.mode] || q.mode;
      const opLabel = { "=": "=", "<=": "<=", ">=": ">=" }[q.operator] || q.operator;
      const lines = [];
      lines.push(`Minigolf Abfrage - ${player.name}`);
      lines.push(`Zeitraum: ${periodLabel(q.period)}`);
      lines.push(`Kriterium: ${modeLabel} ${opLabel} ${q.value}`);
      lines.push(`Treffer: ${r.matches} von ${r.total} (${r.total>0?(r.matches/r.total*100).toFixed(1).replace('.',','):'0'} %)`);
      if (q.compareEnabled && q.resultB) {
        const rB = q.resultB;
        lines.push(`Vergleich ${periodLabel(q.periodB)}: ${rB.matches} von ${rB.total} (${rB.total>0?(rB.matches/rB.total*100).toFixed(1).replace('.',','):'0'} %)`);
      }
      lines.push("");
      lines.push("Datum;Gesamt;Asse;Fehler");
      r.matchedRounds.forEach(round => {
        const total = round.scores.reduce((a,b)=>a+b,0);
        lines.push(`${formatDate(round.date)};${total};${roundAces(round)};${roundErrors(round)}`);
      });
      const text = lines.join("\n");
      state.queryExportText = text;
      attemptCopy(text);
      render();
      break;
    }
  }
}

// ============================================================
// Init
// ============================================================
render();
</script>
</body>
</html>
